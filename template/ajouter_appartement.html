
      
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier une annonce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-publish { background-color: #157347; color: white; border: none; padding: 10px 30px; }
        .btn-publish:hover { background-color: #115c39; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="text-center mb-4">
                <h1 class="fw-bold" style="color: #4b0082;">Publier un appartement</h1>
                <p class="text-muted">Renseignez les informations principales du logement</p>
            </div>

            <div class="card p-4">
                <form>
                    <div class="mb-3">
                        <label for="titre" class="form-label fw-semibold">Titre de l'annonce</label>
                        <input type="text" class="form-control" id="titre" placeholder="Ex: Studio moderne à Akwa">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label fw-semibold">Type de logement</label>
                            <select class="form-select" id="type">
                                <option selected>Choisir...</option>
                                <option value="1">Appartement</option>
                                <option value="2">Studio</option>
                                <option value="3">Chambre</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="quartier" class="form-label fw-semibold">Quartier</label>
                            <input type="text" class="form-control" id="quartier" placeholder="Ex: Bonapriso">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="prix" class="form-label fw-semibold">Prix (FCFA)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="prix" placeholder="Montant mensuel">
                            <span class="input-group-text">FCFA</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="description" rows="4" placeholder="Décrivez les atouts du logement..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="contact" class="form-label fw-semibold">Contact propriétaire</label>
                        <input type="tel" class="form-control" id="contact" placeholder="Numéro de téléphone">
                    </div>

                    <div class="mb-4">
                        <label for="photos" class="form-label fw-semibold">Photos du logement</label>
                        <input class="form-control" type="file" id="photos" multiple>
                        <div class="form-text">Ajoutez plusieurs photos (la première sera la principale).</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-publish btn-lg fw-bold">Publier l'annonce</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
