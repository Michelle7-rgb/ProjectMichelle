{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Plateforme Immobilière{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app.css' %}">
</head>
<body>
<button id="mobileMenuBtn" class="mobile-menu-btn" type="button" aria-label="Ouvrir le menu" aria-expanded="false">☰</button>
<div class="app">
    {% include 'sidebar.html' %}
    <main class="main">
        <div class="content-shell" id="mainContent">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>
<script src="{% static 'app.js' %}"></script>
</body>
</html>
