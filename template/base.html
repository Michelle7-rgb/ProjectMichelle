{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Plateforme Immobilière{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app.css' %}">
</head>
<body>
<button id="mobileMenuBtn" class="mobile-menu-btn" type="button" aria-label="Ouvrir le menu" aria-expanded="false">☰</button>
<div class="app">
    {% include 'sidebar.html' %}
    <main class="main">
        <div class="content-shell" id="mainContent">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<footer class="site-footer">
    <div class="site-footer-inner">
        <div>
            <p class="site-footer-brand">Logement</p>
            <p class="site-footer-text">Plateforme immobilière sobre, moderne et pensée pour aller vite.</p>
        </div>
        <div class="site-footer-links">
            <a href="{% url 'feed' %}">Feed</a>
            <a href="{% url 'tenant_favorites' %}">Favoris</a>
            <a href="{% url 'messages' %}">Messages</a>
        </div>
        <p class="site-footer-copy">© 2026 Logement. Tous droits réservés.</p>
    </div>
</footer>
<div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>
<script src="{% static 'app.js' %}"></script>
</body>
</html>
