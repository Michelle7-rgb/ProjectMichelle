{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Logement</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app.css' %}">
</head>
<body>
<section class="auth-page">
    <article class="auth-card">
        <header class="auth-card-head">
            <h1>Connexion</h1>
            <p>Accedez a votre espace pro pour gerer annonces, favoris et conversations.</p>
        </header>

        {% if messages %}
        <div class="auth-messages">
            {% for message in messages %}
            <p class="{{ message.tags|default:'error' }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div>
                <label for="username">Nom d'utilisateur</label>
                <input id="username" type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
            <div>
                <label for="password">Mot de passe</label>
                <input id="password" type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <p class="auth-footer">Pas de compte ? <a href="{% url 'register' %}">S'inscrire</a></p>
        <p class="auth-back"><a href="{% url 'accueil' %}">Retour a l'accueil</a></p>
    </article>
</section>
</body>
</html>
