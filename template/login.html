
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5 card shadow-lg p-4 mt-5 bg-success-subtle" style="width: 20%; height: 50%;" >
<h3 class="test-center mb-4 text-success text-center mb-4">Connexion</h3>
<form method="post" class="mb-3 p-2 shadow rounded ">
    {% csrf_token %}
    <label class="form-label">Nom d'utilisateur</label>
    <input 
        type="text"
        name="username" 
        placeholder="Nom d'utilisateur" 
        class="form-control">
        <br>
        <label class="form-label">Mot de passe</label>
    <input 
        type="password" 
        name="password" 
        placeholder="Mot de passe" 
        class="form-control">
        <br>
        <div class="d-grid">
    <button class="btn btn-primary">
        Se connecter
    </button>
    </div>
</form>
<p class="text-success">
    Pas de compte ? 
    <a href="{% url 'register' %}" class="">S’inscrire</a>
</p>   
</div>
{% endblock %}
