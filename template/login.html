{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Logement</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app.css' %}">
    <style>
        .auth-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            background:
                linear-gradient(135deg, rgba(37, 63, 116, 0.9), rgba(37, 63, 116, 0.68)),
                url('https://images.unsplash.com/photo-1460317442991-0ec209397118?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
        }

        .auth-card {
            width: min(420px, 100%);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(251, 253, 255, 0.96);
            box-shadow: 0 24px 42px rgba(9, 18, 39, 0.32);
            overflow: hidden;
        }

        .auth-card-head {
            padding: 20px 22px 8px;
        }

        .auth-card-head h1 {
            color: var(--brand-navy-deep);
            font-size: 1.86rem;
            margin-bottom: 6px;
        }

        .auth-card-head p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .auth-form {
            padding: 14px 22px 22px;
            display: grid;
            gap: 12px;
        }

        .auth-form label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 4px;
            display: inline-block;
        }

        .auth-footer {
            padding: 0 22px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--brand-navy);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-back {
            padding: 0 22px 18px;
        }

        .auth-back a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.84rem;
        }

        .auth-messages {
            padding: 0 22px;
        }

        .auth-messages p {
            margin-bottom: 8px;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.84rem;
        }

        .auth-messages .error {
            background: rgba(192, 52, 58, 0.1);
            color: var(--danger);
            border: 1px solid rgba(192, 52, 58, 0.2);
        }

        .auth-messages .success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
            border: 1px solid rgba(22, 163, 74, 0.2);
        }
    </style>
</head>
<body>
<section class="auth-page">
    <article class="auth-card">
        <header class="auth-card-head">
            <h1>Connexion</h1>
            <p>Accedez a votre espace pour gerer annonces, favoris et messages.</p>
        </header>

        {% if messages %}
        <div class="auth-messages">
            {% for message in messages %}
            <p class="{{ message.tags|default:'error' }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div>
                <label for="username">Nom d'utilisateur</label>
                <input id="username" type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
            <div>
                <label for="password">Mot de passe</label>
                <input id="password" type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <p class="auth-footer">
            Pas de compte ? <a href="{% url 'register' %}">S'inscrire</a>
        </p>
        <p class="auth-back">
            <a href="{% url 'accueil' %}">Retour a l'accueil</a>
        </p>
    </article>
</section>
</body>
</html>
