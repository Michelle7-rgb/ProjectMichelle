{% extends 'base.html' %}
{% block page_title %}Publier - IMMOPro{% endblock %}
{% block content %}
<section class="view">
    <header class="view-head">
        <div>
            <h2>Publier une annonce</h2>
            <p>Créez une fiche complète pour augmenter votre visibilité.</p>
        </div>
        <span class="badge">Brouillon</span>
    </header>

    <div class="panel">
        <div class="panel-body">
            <form class="form-grid" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="field">
                    <label>Titre</label>
                    <input type="text" name="titre" placeholder="Appartement moderne à Akwa" required>
                </div>
                <div class="field">
                    <label>Type de bien</label>
                    <select name="type_logement" required>
                        <option value="">Choisir...</option>
                        <option value="appartement">Appartement</option>
                        <option value="studio">Studio</option>
                        <option value="maison">Maison</option>
                        <option value="chambre">Chambre</option>
                    </select>
                </div>
                <div class="field">
                    <label>Prix mensuel (FCFA)</label>
                    <input type="number" name="prix" placeholder="150000" required>
                </div>
                <div class="field">
                    <label>Localisation</label>
                    <input type="text" name="quartier" placeholder="Douala, Bonamoussadi" required>
                </div>
                <div class="field">
                    <label>Contact propriétaire</label>
                    <input type="text" name="contact" placeholder="6XX XX XX XX" required>
                </div>
                <div class="field">
                    <label>Photos</label>
                    <input type="file" name="images" multiple>
                </div>
                <div class="field span-all">
                    <label>Description</label>
                    <textarea name="description" placeholder="Décrivez les points forts du bien..." required></textarea>
                </div>
                <div class="btn-row action-row-wide">
                    <button type="submit">Publier</button>
                    <a href="{% url 'owner_listings' %}" class="btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
